{% extends "base.html" %}
{% block title %}Log In — SecureBank{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-sm-9 col-md-6 col-lg-5">

    <!-- Bank logo / header -->
    <div class="text-center mb-4 mt-3">
      <div class="display-4 mb-2">🏦</div>
      <h1 class="h3 fw-bold text-primary">SecureBank</h1>
      <p class="text-muted small">Online Banking Portal</p>
    </div>

    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <h2 class="h5 card-title mb-4 text-center">Sign in to your account</h2>

        <!-- Inline error (from backend template variable) -->
        {% if error %}
        <div class="alert alert-danger py-2 small" role="alert">
          {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('login_post') }}" novalidate>
          <!-- Username -->
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input
              type="text"
              class="form-control"
              id="username"
              name="username"
              autocomplete="username"
              required
              autofocus
            />
          </div>

          <!-- Password -->
          <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <input
              type="password"
              class="form-control"
              id="password"
              name="password"
              autocomplete="current-password"
              required
            />
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-primary">Log In</button>
          </div>
        </form>

      </div>
    </div>

    <!-- Demo credentials hint (remove in production) -->
    <div class="card mt-3 border-0 bg-light">
      <div class="card-body py-2 px-3 small text-muted">
        <strong>Demo accounts:</strong><br />
        alice / password123 &nbsp;|&nbsp; bob / securepass
      </div>
    </div>

  </div>
</div>
{% endblock %}
